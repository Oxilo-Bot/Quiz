<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quiz Live</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <nav class="nav-actions" aria-label="Navigation principale">
          <a href="#/admin" class="nav-link">Admin</a>
        </nav>
      </header>

      <main id="app" class="main" tabindex="-1"></main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <dialog id="settings-dialog" class="dialog">
      <form method="dialog" class="dialog-panel" id="settings-form">
        <div class="dialog-header">
          <div>
            <p class="eyebrow">Connexion</p>
            <h2>Parametres Supabase</h2>
          </div>
          <button class="icon-button" type="submit" value="cancel" aria-label="Fermer">x</button>
        </div>
        <label class="field">
          <span>URL du projet</span>
          <input id="supabase-url" name="url" placeholder="https://xxxx.supabase.co" autocomplete="off" />
        </label>
        <label class="field">
          <span>Anon key</span>
          <input id="supabase-key" name="key" placeholder="eyJhbGciOi..." autocomplete="off" />
        </label>
        <div class="dialog-actions">
          <button class="secondary-button" type="submit" value="cancel">Annuler</button>
          <button class="primary-button" type="submit" value="save">Enregistrer</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
