<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quiz Live</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <nav class="nav-actions" aria-label="Navigation principale">
          <a href="#/admin" class="nav-link">Admin</a>
        </nav>
      </header>

      <main id="app" class="main" tabindex="-1"></main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <dialog id="confirm-dialog" class="dialog">
      <form method="dialog" class="dialog-panel" id="confirm-form">
        <div>
          <p class="eyebrow">Confirmation</p>
          <h2 id="confirm-title">Lancer ce quiz ?</h2>
        </div>
        <p class="muted" id="confirm-message">Vous etes sur de lancer ce quizz ?</p>
        <div class="dialog-actions">
          <button class="secondary-button" type="submit" value="no">Non</button>
          <button class="primary-button" type="submit" value="yes">Oui</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
